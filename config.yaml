app:
  live_mode: false
  paper_mode: true
  poll_interval_seconds: 5
  db_path: trades.db

market:
  # 👇 THIS IS WHAT YOU WERE MISSING
  price_source_url: "https://your-price-api.com/data"

strategy:
  momentum_window: 5
  reversal_confirmation_ticks: 2

risk:
  bankroll_usd: 1000
  kelly_fraction: 0.25
  min_order_usd: 10
  max_order_usd: 100

  max_concurrent_positions: 3
  max_open_exposure_usd: 300

  panic_stop_enabled: true
  panic_stop_daily_loss_usd: 100

execution:
  tp_small: 0.02
  sl_small: 0.02
  time_stop_small_min: 10

  tp_medium: 0.04
  sl_medium: 0.03
  time_stop_medium_min: 15

  tp_large: 0.06
  sl_large: 0.04
  time_stop_large_min: 20
